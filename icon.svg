<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="amberLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="steelLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="beaconGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="64" fill="#0f172a"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="220" rx="180" ry="180" fill="url(#beaconGlow)"/>

  <!-- Signal arcs -->
  <g stroke="#22d3ee" fill="none" stroke-linecap="round">
    <path d="M 120,170 Q 80,256 120,342" stroke-width="3" opacity="0.15"/>
    <path d="M 392,170 Q 432,256 392,342" stroke-width="3" opacity="0.15"/>
    <path d="M 155,195 Q 120,256 155,317" stroke-width="3.5" opacity="0.22"/>
    <path d="M 357,195 Q 392,256 357,317" stroke-width="3.5" opacity="0.22"/>
  </g>

  <!-- Tower structure -->
  <g transform="translate(256, 100)">
    <!-- Main mast -->
    <rect x="-10" y="60" width="20" height="260" rx="3" fill="url(#steelLight)"/>
    <!-- Cross beams -->
    <rect x="-40" y="220" width="80" height="8" rx="3" fill="url(#steel)"/>
    <rect x="-33" y="170" width="66" height="7" rx="3" fill="url(#steel)"/>
    <rect x="-25" y="125" width="50" height="6" rx="3" fill="url(#steel)"/>
    <!-- Tapered struts -->
    <line x1="-40" y1="224" x2="-10" y2="70" stroke="#475569" stroke-width="4.5"/>
    <line x1="40" y1="224" x2="10" y2="70" stroke="#475569" stroke-width="4.5"/>
    <!-- Lower legs -->
    <line x1="-70" y1="320" x2="-40" y2="224" stroke="#475569" stroke-width="5"/>
    <line x1="70" y1="320" x2="40" y2="224" stroke="#475569" stroke-width="5"/>
    <!-- Base platform -->
    <rect x="-80" y="320" width="160" height="12" rx="4" fill="url(#steel)"/>
    <rect x="-60" y="314" width="120" height="10" rx="3" fill="url(#steelLight)"/>

    <!-- Beacon light -->
    <g filter="url(#glow)">
      <circle cx="0" cy="52" r="24" fill="url(#amber)"/>
      <circle cx="0" cy="52" r="14" fill="url(#amberLight)"/>
    </g>
    <!-- Antenna -->
    <line x1="0" y1="28" x2="0" y2="0" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-4" r="5" fill="#fbbf24"/>

    <!-- Lightning bolt -->
    <g filter="url(#glow)" transform="translate(-22, 230)">
      <polygon points="22,0 6,38 17,38 0,78 46,28 31,28 50,0" fill="url(#amberLight)"/>
    </g>
  </g>
</svg>
